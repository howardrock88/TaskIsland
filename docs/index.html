  <h1>任务岛</h1>
  <p>任务岛是一款本地优先的 macOS 悬浮任务管理工具，把待办、提醒和专注计时放在桌面顶部，帮助用户持续看见当前最重要的事。</p>
  <ul>
    <li>悬浮任务岛：快速查看任务数量、当前专注事项和重点任务。</li>
    <li>专注计时：为任务设置专注分钟，开始、暂停和完成都可以直接操作。</li>
    <li>本地优先：当前版本无需账号登录，任务数据默认保存在用户本机。</li>
  </ul>
