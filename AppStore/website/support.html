    <p class="eyebrow">Support</p>
    <h1>任务岛技术支持</h1>
    <p>如果你在使用任务岛时遇到问题，或希望反馈建议，可以通过以下方式联系。</p>

    <h2>联系方式</h2>
    <p>支持入口：<a href="https://github.com/howardrock88/TaskIsland/issues">GitHub Issues</a></p>

    <h2>反馈时建议附带</h2>
    <ul>
      <li>你的 macOS 版本。</li>
      <li>任务岛版本号。</li>
      <li>问题出现的步骤。</li>
      <li>如方便，可附带截图或录屏。</li>
    </ul>

    <h2>常见说明</h2>
    <p>任务岛当前版本为本地优先工具，不需要账号登录。任务数据默认保存在用户本机。Apple 提醒事项权限仅用于用户主动导入或导出提醒事项；本地通知权限仅用于任务提醒。</p>
